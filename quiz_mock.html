<!DOCTYPE html>
<html lang=""ja"">
<head>
  <meta charset=""UTF-8"">
  <link rel=""stylesheet"" href=""file:///C:/Users/makoto/Documents/GitHub/Vocabraly-Marathon-PassTan/style.css"">
  <style>body { background-color: var(--bg-light); }</style>
</head>
<body>
  <div id=""quizScreen"" class=""screen active"">

        <p class=""question-text"">I have a [<span class=""blank-spot""> </span>] in my stomach.</p>
        <p class=""question-ja"">胃に[痛み]があります。</p>
      </div>
      <div class=""choices-area"">
        <button class=""choice-btn""><span class=""choice-num"">1</span> pain</button>
        <button class=""choice-btn""><span class=""choice-num"">2</span> dream</button>
        <button class=""choice-btn""><span class=""choice-num"">3</span> luck</button>
        <button class=""choice-btn""><span class=""choice-num"">4</span> job</button>
      </div>
    </div>
  </div>
